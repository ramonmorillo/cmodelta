<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>cmodelta</title><style>body{font-family:Arial;margin:0;background:#f4f7fb;color:#1f2937}header{background:#12395f;color:#fff;padding:12px 16px}.wrap{max-width:1400px;margin:auto;padding:12px}.grid{display:grid;grid-template-columns:340px 1fr;gap:12px}.card{background:#fff;border:1px solid #d8e0ea;border-radius:8px;padding:10px}.patients{max-height:340px;overflow:auto}.p-item{border:1px solid #d9e3ef;padding:8px;border-radius:8px;margin:6px 0;cursor:pointer}.p-item.active{background:#e8f0fb;border-color:#1d4ed8}input,select,textarea,button{width:100%;padding:8px;margin:4px 0;border:1px solid #c9d4e3;border-radius:6px;box-sizing:border-box}button{background:#12395f;color:#fff;cursor:pointer}.msg{display:none;padding:8px;border-radius:6px;margin:8px 0}.ok{background:#dcfce7}.err{background:#fee2e2}.info{background:#e0f2fe}.empty{display:flex;align-items:center;justify-content:center;min-height:400px;text-align:center;color:#4b5563}.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tab{padding:7px 10px;border:1px solid #cdd8e6;border-radius:999px;cursor:pointer;background:#fff}.tab.active{background:#12395f;color:#fff}.cards{display:grid;grid-template-columns:repeat(3,minmax(130px,1fr));gap:8px}.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th,.tbl td{border:1px solid #e5e7eb;padding:4px;text-align:left}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.warn{background:#fff7ed;border-left:4px solid #f97316;padding:8px}.small{font-size:12px;color:#6b7280}@media(max-width:960px){.grid{grid-template-columns:1fr}}</style></head><body><header><h3 id='appTitle'>cmodelta</h3><div id='appSubtitle'></div></header><div class='wrap'><div id='warning' class='warn'></div><div id='msg' class='msg'></div><div class='grid'><section class='card'><h4>Pacientes</h4><input id='search' placeholder='Buscar por codigoPaciente'><div id='patientList' class='patients'></div><hr><h4>Crear/editar paciente</h4><input id='idPaciente' type='hidden'><input id='codigoPaciente' placeholder='codigoPaciente'><input id='centro' placeholder='centro'><input id='fechaAlta' type='date'><select id='estado'><option value=''>estado</option><option>Activo</option><option>Seguimiento finalizado</option><option>Perdido</option><option>Suspendido</option></select><select id='tratamientoActivo'><option value=''>tratamientoActivo</option><option>Sí</option><option>No</option></select><select id='nivelCMOActual'><option value=''>nivelCMOActual</option><option>Nivel 1</option><option>Nivel 2</option><option>Nivel 3</option></select><textarea id='obsPaciente' placeholder='observaciones'></textarea><button id='saveBtn'>Guardar paciente</button></section><section class='card'><div id='workspace'></div></section></div></div><script>
let selectedPatientId='';let patientsCache=[];let currentBundle=null;let activeTab='Resumen';
const tabs=['Resumen','Visitas','Dispensaciones','Activación','Autoadministración','Respuesta','Seguridad','Intervenciones','Informe'];
function showMessage(type,text){const m=document.getElementById('msg');m.className='msg '+(type==='ok'?'ok':type==='error'?'err':'info');m.style.display='block';m.textContent=text;}
function call(name,...args){return new Promise(res=>google.script.run.withSuccessHandler(res).withFailureHandler(e=>res({ok:false,error:e.message||String(e)}))[name](...args));}
async function initApp(){const r=await call('apiGetInitialData');if(!r.ok)return showMessage('error',r.error);document.getElementById('appTitle').textContent=r.data.appTitle;document.getElementById('appSubtitle').textContent=r.data.appSubtitle;document.getElementById('warning').textContent=r.data.dataWarning;await loadPatients();renderEmptyState();}
async function loadPatients(){const r=await call('listPatients',document.getElementById('search').value||'');if(!r.ok)return showMessage('error',r.error);patientsCache=r.data||[];renderPatientList(patientsCache);}
function renderPatientList(patients){const box=document.getElementById('patientList');box.innerHTML=patients.length?patients.map(p=>`<div class='p-item ${selectedPatientId===p.idPaciente?'active':''}' data-id='${p.idPaciente}'><b>${esc(p.codigoPaciente)}</b><div class='small'>${esc(p.centro)} · ${esc(p.estado)} · ${esc(p.nivelCMOActual)}</div></div>`).join(''):"<div class='small'>Sin pacientes todavía</div>";box.querySelectorAll('.p-item').forEach(el=>el.onclick=()=>selectPatient(el.getAttribute('data-id')));}
function renderEmptyState(){document.getElementById('workspace').innerHTML="<div class='empty'><div class='card'><b>Seleccione un paciente del listado o cree uno nuevo para iniciar el seguimiento farmacéutico CMO.</b></div></div>";}
async function selectPatient(idPaciente){selectedPatientId=idPaciente;renderPatientList(patientsCache);await loadPatientBundle(idPaciente);}
async function loadPatientBundle(idPaciente){const r=await call('getPatientBundle',idPaciente);if(!r.ok)return showMessage('error',r.error);currentBundle=r.data;renderPatientFicha(currentBundle);}
function renderPatientFicha(bundle){const p=bundle.patient;const cards=[["Nivel CMO",p.nivelCMOActual],["Tratamiento activo",p.tratamientoActivo],["Última dispensación",bundle.dispensations[0]?bundle.dispensations[0].fechaReal:'Sin registros todavía'],["Última activación",bundle.activations[0]?bundle.activations[0].nivelActivacion:'Sin registros todavía'],["Última respuesta",bundle.responses[0]?bundle.responses[0].respuestaGlobal:'Sin registros todavía'],["Alertas de seguridad",bundle.safetyEvents[0]?bundle.safetyEvents[0].tipoEvento:'Sin registros todavía']];document.getElementById('workspace').innerHTML=`<h3>Ficha del paciente</h3><div class='row'><div><b>Código:</b> ${esc(p.codigoPaciente)}</div><div><b>Centro:</b> ${esc(p.centro)}</div></div><div class='row'><div><b>Estado:</b> ${esc(p.estado)}</div><div><b>Tratamiento activo:</b> ${esc(p.tratamientoActivo)}</div></div><div class='row'><div><b>Nivel CMO actual:</b> ${esc(p.nivelCMOActual)}</div><div><b>Fecha alta:</b> ${esc(p.fechaAlta)}</div></div><div><b>Fecha última visita:</b> ${esc(p.fechaUltimaVisita||'-')}</div><div class='cards'>${cards.map(c=>`<div class='card'><div class='small'>${c[0]}</div><b>${esc(c[1])}</b></div>`).join('')}</div><div class='tabs'>${tabs.map(t=>`<button class='tab ${activeTab===t?'active':''}' onclick="switchPatientTab('${t}')">${t}</button>`).join('')}</div><div id='tabContent'></div>`;switchPatientTab(activeTab);}
function switchPatientTab(tabName){activeTab=tabName;if(!currentBundle)return;const map={'Resumen':renderResumen,'Visitas':renderVisitas,'Dispensaciones':renderDispensaciones,'Activación':renderActivacion,'Autoadministración':renderAutoadministracion,'Respuesta':renderRespuesta,'Seguridad':renderSeguridad,'Intervenciones':renderIntervenciones,'Informe':renderInforme};document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent===tabName));document.getElementById('tabContent').innerHTML=map[tabName](currentBundle);bindTabActions(tabName);}
function rowsOrEmpty(rows,col){return rows.length?rows.join(''):`<tr><td colspan='${col}'>Sin registros todavía</td></tr>`;}
function renderResumen(b){return `<h4>Resumen</h4>${mini('Últimas visitas',b.visits.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.tipoVisita||'')}</td></tr>`),['Fecha','Tipo'])}${mini('Últimas dispensaciones',b.dispensations.map(x=>`<tr><td>${x.fechaReal||''}</td><td>${x.retrasoDias||0}</td></tr>`),['Fecha','Retraso'])}${mini('Última activación',b.activations.slice(0,1).map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.nivelActivacion||'')}</td></tr>`),['Fecha','Nivel'])}`;}
function mini(t,rows,heads){return `<div class='card'><b>${t}</b><table class='tbl'><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr>${rowsOrEmpty(rows,heads.length)}</table></div>`;}
function renderVisitas(b){return `<h4>Visitas</h4><div class='row'><input id='vfecha' type='date'><select id='vtipo'><option>Inicial</option><option>Seguimiento</option><option>Final</option></select></div><div class='row'><select id='vmod'><option>Presencial</option><option>Telefónica</option></select><select id='vnivel'><option>Nivel 1</option><option>Nivel 2</option><option>Nivel 3</option></select></div><button id='saveVisit'>Guardar visita</button><table class='tbl'><tr><th>Fecha</th><th>Tipo</th><th>Modalidad</th><th>Nivel</th></tr>${rowsOrEmpty(b.visits.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.tipoVisita||'')}</td><td>${esc(x.modalidad||'')}</td><td>${esc(x.nivelCMO||'')}</td></tr>`),4)}</table>`;}
function renderDispensaciones(b){return `<h4>Dispensaciones</h4><div class='row'><input id='dprev' type='date'><input id='dreal' type='date'></div><button id='saveDisp'>Guardar dispensación</button><table class='tbl'><tr><th>Prevista</th><th>Real</th><th>Retraso</th></tr>${rowsOrEmpty(b.dispensations.map(x=>`<tr><td>${x.fechaPrevista||''}</td><td>${x.fechaReal||''}</td><td>${x.retrasoDias||0}</td></tr>`),3)}</table>`;}
function renderActivacion(b){const s=i=>`<select id='a${i}'><option value='0'>0</option><option value='1'>1</option><option value='2'>2</option></select>`;return `<h4>Activación</h4><div class='small'>Índice operativo de apoyo a la entrevista farmacéutica. No es un cuestionario validado.</div><div class='row'>${s(1)}${s(2)}</div><div class='row'>${s(3)}${s(4)}</div><div class='row'>${s(5)}${s(6)}</div><div class='row'>${s(7)}${s(8)}</div><button id='saveAct'>Guardar activación</button><table class='tbl'><tr><th>Fecha</th><th>Puntuación</th><th>Nivel</th></tr>${rowsOrEmpty(b.activations.map(x=>`<tr><td>${x.fecha||''}</td><td>${x.puntuacionTotal||''}</td><td>${esc(x.nivelActivacion||'')}</td></tr>`),3)}</table>`;}
function renderAutoadministracion(b){return `<h4>Autoadministración</h4><input id='autf' type='date'><input id='autr' placeholder='Resultado global'><button id='saveAut'>Guardar registro</button><table class='tbl'><tr><th>Fecha</th><th>Resultado</th></tr>${rowsOrEmpty(b.selfAdministration.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.resultadoGlobal||'')}</td></tr>`),2)}</table>`;}
function renderRespuesta(b){return `<h4>Respuesta</h4><div class='small'>La herramienta no recomienda cambios terapéuticos automáticos. La respuesta debe interpretarse con el equipo médico.</div><input id='rf' type='date'><input id='rg' placeholder='respuestaGlobal'><select id='rr'><option>Sí</option><option>No</option></select><button id='saveRsp'>Guardar respuesta</button><table class='tbl'><tr><th>Fecha</th><th>Global</th></tr>${rowsOrEmpty(b.responses.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.respuestaGlobal||'')}</td></tr>`),2)}</table>`;}
function renderSeguridad(b){return `<h4>Seguridad</h4><input id='sf' type='date'><input id='st' placeholder='tipoEvento'><select id='sg'><option>Leve</option><option>Moderada</option><option>Grave</option></select><button id='saveSeg'>Guardar evento</button><table class='tbl'><tr><th>Fecha</th><th>Evento</th><th>Gravedad</th></tr>${rowsOrEmpty(b.safetyEvents.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.tipoEvento||'')}</td><td>${esc(x.gravedad||'')}</td></tr>`),3)}</table>`;}
function renderIntervenciones(b){return `<h4>Intervenciones</h4><input id='if' type='date'><input id='idom' placeholder='dominioCMO'><input id='itipo' placeholder='tipoIntervencion'><button id='saveInt'>Guardar intervención</button><table class='tbl'><tr><th>Fecha</th><th>Dominio</th><th>Tipo</th></tr>${rowsOrEmpty(b.interventions.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.dominioCMO||'')}</td><td>${esc(x.tipoIntervencion||'')}</td></tr>`),3)}</table>`;}
function renderInforme(b){return `<h4>Informe</h4><textarea id='recommendation' placeholder='Recomendación farmacéutica editable'></textarea><button id='genReport'>Generar informe</button><button onclick='window.print()'>Imprimir</button><div class='card' id='reportBox'>${b.reportHtml||'Sin registros todavía'}</div>`;}
function bindTabActions(t){const on=async(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};on('saveVisit',async()=>saveAndReload('createVisit',{idPaciente:selectedPatientId,fecha:val('vfecha'),tipoVisita:val('vtipo'),modalidad:val('vmod'),nivelCMO:val('vnivel')}));on('saveDisp',async()=>{const r=await call('createDispensation',{idPaciente:selectedPatientId,fechaPrevista:val('dprev'),fechaReal:val('dreal')});if(!r.ok)return showMessage('error',r.error);showMessage('ok','Dispensación guardada. Retraso: '+r.data.retrasoDias+' días.');loadPatientBundle(selectedPatientId);});on('saveAct',async()=>{const p={idPaciente:selectedPatientId,fecha:new Date().toISOString().slice(0,10),enfermedad:val('a1'),objetivoTratamiento:val('a2'),administracion:val('a3'),conservacion:val('a4'),olvidos:val('a5'),efectosAdversos:val('a6'),contacto:val('a7'),decisiones:val('a8')};const r=await call('createActivation',p);if(!r.ok)return showMessage('error',r.error);showMessage('ok','Activación guardada. Puntuación: '+r.data.puntuacionTotal+' ('+r.data.nivelActivacion+').');loadPatientBundle(selectedPatientId);});on('saveAut',()=>saveAndReload('createSelfAdministration',{idPaciente:selectedPatientId,fecha:val('autf'),resultadoGlobal:val('autr')}));on('saveRsp',()=>saveAndReload('createResponse',{idPaciente:selectedPatientId,fecha:val('rf'),respuestaGlobal:val('rg'),requiereRevisionMedica:val('rr')}));on('saveSeg',()=>saveAndReload('createSafetyEvent',{idPaciente:selectedPatientId,fecha:val('sf'),tipoEvento:val('st'),gravedad:val('sg')}));on('saveInt',()=>saveAndReload('createIntervention',{idPaciente:selectedPatientId,fecha:val('if'),dominioCMO:val('idom'),tipoIntervencion:val('itipo')}));on('genReport',async()=>{const r=await call('apiBuildReport',selectedPatientId,val('recommendation'));if(!r.ok)return showMessage('error',r.error);document.getElementById('reportBox').innerHTML=r.data.reportHtml;});}
async function saveAndReload(api,payload){const r=await call(api,payload);if(!r.ok)return showMessage('error',r.error);showMessage('ok','Registro guardado correctamente.');loadPatientBundle(selectedPatientId);} 
function val(id){const e=document.getElementById(id);return e?e.value:'';}function esc(s){return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));}
async function savePatient(){const data={codigoPaciente:val('codigoPaciente'),centro:val('centro'),fechaAlta:val('fechaAlta'),estado:val('estado'),tratamientoActivo:val('tratamientoActivo'),nivelCMOActual:val('nivelCMOActual'),observaciones:val('obsPaciente')};const id=val('idPaciente');const r= id? await call('updatePatient',id,data): await call('createPatient',data);if(!r.ok)return showMessage('error',r.error);showMessage('ok','Paciente guardado correctamente.');await loadPatients();await selectPatient(r.data.idPaciente);} 
document.getElementById('search').oninput=loadPatients;document.getElementById('saveBtn').onclick=savePatient;initApp();
</script></body></html>
