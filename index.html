<!DOCTYPE html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>cmodelta</title>
<style>body{font-family:Arial;margin:0;background:#f4f7fb;color:#1f2937}header{background:#12395f;color:#fff;padding:12px 16px}.wrap{max-width:1400px;margin:auto;padding:12px}.grid{display:grid;grid-template-columns:340px 1fr;gap:12px}.card{background:#fff;border:1px solid #d8e0ea;border-radius:8px;padding:10px}.patients{max-height:340px;overflow:auto}.p-item{border:1px solid #d9e3ef;padding:8px;border-radius:8px;margin:6px 0;cursor:pointer}.p-item.active{background:#e8f0fb;border-color:#1d4ed8}input,select,textarea,button{width:100%;padding:8px;margin:4px 0;border:1px solid #c9d4e3;border-radius:6px;box-sizing:border-box}button{background:#12395f;color:#fff;cursor:pointer}.msg{display:none;padding:8px;border-radius:6px;margin:8px 0}.ok{background:#dcfce7}.err{background:#fee2e2}.info{background:#e0f2fe}.empty{display:flex;align-items:center;justify-content:center;min-height:400px;text-align:center;color:#4b5563}.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tab{padding:7px 10px;border:1px solid #cdd8e6;border-radius:999px;cursor:pointer;background:#fff}.tab.active{background:#12395f;color:#fff}.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th,.tbl td{border:1px solid #e5e7eb;padding:4px;text-align:left}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.warn{background:#fff7ed;border-left:4px solid #f97316;padding:8px}.small{font-size:12px;color:#6b7280}@media(max-width:960px){.grid{grid-template-columns:1fr}}</style></head>
<body><header><h3 id='appTitle'>cmodelta</h3><div id='appSubtitle'></div></header><div class='wrap'><div id='warning' class='warn'></div><div id='msg' class='msg'></div><div class='grid'>
<section class='card'><h4>Pacientes</h4><input id='search' placeholder='Buscar por codigoPaciente'><div id='patientList' class='patients'></div><hr><h4>Crear/editar paciente</h4><input id='idPaciente' type='hidden'><input id='codigoPaciente' placeholder='codigoPaciente'><input id='centro' placeholder='centro'><input id='fechaAlta' type='date'><select id='estado'><option value=''>estado</option><option>Activo</option><option>Seguimiento finalizado</option><option>Perdido</option><option>Suspendido</option></select><select id='tratamientoActivo'><option value=''>tratamientoActivo</option><option>Sí</option><option>No</option></select><select id='nivelCMOActual'><option value=''>nivelCMOActual</option><option>Nivel 1</option><option>Nivel 2</option><option>Nivel 3</option></select><textarea id='obsPaciente' placeholder='observaciones'></textarea><button id='saveBtn'>Guardar paciente</button></section>
<section class='card'><div id='workspace'></div></section></div></div>
<script>
let selectedPatientId = null; let patientsCache = []; let currentBundle = null; let activeTab = 'Resumen';
const tabs=['Resumen','Visitas','Dispensaciones','Activación','Informe'];
function esc(s){return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));}
function val(id){const e=document.getElementById(id);return e?e.value:'';}
function showMessage(type,text){const m=document.getElementById('msg');m.className='msg '+(type==='success'?'ok':type==='error'?'err':'info');m.style.display='block';m.textContent=text;}
function renderEmptyState(msg){document.getElementById('workspace').innerHTML="<div class='empty'><div class='card'><b>"+esc(msg||'Seleccione un paciente o cree uno nuevo')+"</b></div></div>";}
function handleFailure(ctx,error){console.error('google.script.run failure',ctx,error);showMessage('error','Error en '+ctx+': '+(error&&error.message?error.message:String(error)));renderEmptyState('No se pudo completar la operación.');}

function initApp(){renderEmptyState('Seleccione un paciente o cree uno nuevo');google.script.run.withSuccessHandler(function(r){if(!r||!r.ok)return showMessage('error',(r&&r.error)||'No se pudo inicializar la aplicación.');document.getElementById('appTitle').textContent=r.data.appTitle||'cmodelta';document.getElementById('appSubtitle').textContent=r.data.appSubtitle||'';document.getElementById('warning').textContent=r.data.dataWarning||'';loadPatients();}).withFailureHandler(function(e){handleFailure('initApp',e);}).apiGetInitialData();}
function loadPatients(){google.script.run.withSuccessHandler(function(r){console.log('listPatients response:',r);if(!r||!r.ok)return showMessage('error',(r&&r.error)||'No se pudo cargar el listado de pacientes.');patientsCache=Array.isArray(r.data)?r.data:[];renderPatientList(patientsCache);if(!selectedPatientId)renderEmptyState('Seleccione un paciente o cree uno nuevo');}).withFailureHandler(function(e){handleFailure('listPatients',e);}).listPatients(document.getElementById('search').value||'');}
function renderPatientList(patients){const box=document.getElementById('patientList');box.innerHTML=patients.length?patients.map(p=>"<div class='p-item "+(selectedPatientId===p.idPaciente?'active':'')+"' data-id='"+esc(p.idPaciente)+"'><b>"+esc(p.codigoPaciente)+"</b><div class='small'>"+esc(p.centro)+" · "+esc(p.estado)+" · "+esc(p.nivelCMOActual)+"</div></div>").join(''):"<div class='small'>Sin pacientes registrados</div>";box.querySelectorAll('.p-item').forEach(el=>el.onclick=()=>selectPatient(el.getAttribute('data-id')));}
function selectPatient(idPaciente){console.log('selected idPaciente:',idPaciente);selectedPatientId=idPaciente;document.getElementById('idPaciente').value=idPaciente||'';renderPatientList(patientsCache);if(!idPaciente)return renderEmptyState('Seleccione un paciente o cree uno nuevo');loadPatientBundle(idPaciente);}
function loadPatientBundle(idPaciente){google.script.run.withSuccessHandler(function(r){console.log('getPatientBundle response:',r);if(!r||!r.ok){showMessage('error',(r&&r.error)||'No se pudo cargar la ficha del paciente.');return renderEmptyState('No se pudo cargar la ficha del paciente');}currentBundle=r.data;renderPatientFicha(currentBundle);}).withFailureHandler(function(e){handleFailure('getPatientBundle',e);renderEmptyState('No se pudo cargar la ficha del paciente');}).getPatientBundle(idPaciente);}
function renderPatientFicha(bundle){if(!bundle||!bundle.patient)return renderEmptyState('No se pudo cargar la ficha del paciente');const p=bundle.patient;const sin=(!bundle.visits.length&&!bundle.dispensations.length&&!bundle.activations.length);document.getElementById('workspace').innerHTML="<h3>Ficha del paciente</h3><div class='row'><div><b>Código:</b> "+esc(p.codigoPaciente)+"</div><div><b>Centro:</b> "+esc(p.centro)+"</div></div><div class='row'><div><b>Estado:</b> "+esc(p.estado)+"</div><div><b>Tratamiento activo:</b> "+esc(p.tratamientoActivo)+"</div></div><div class='row'><div><b>Nivel CMO actual:</b> "+esc(p.nivelCMOActual)+"</div><div><b>Fecha alta:</b> "+esc(p.fechaAlta)+"</div></div><div><b>Fecha última visita:</b> "+esc(p.fechaUltimaVisita||'-')+"</div>"+(sin?"<div class='card' style='margin-top:8px;'><b>Sin registros todavía</b></div>":'')+"<div class='tabs'>"+tabs.map(t=>"<button class='tab "+(activeTab===t?'active':'')+"' onclick=\"switchPatientTab('"+t+"')\">"+t+"</button>").join('')+"</div><div id='tabContent'></div>";switchPatientTab(activeTab);}
function switchPatientTab(tab){activeTab=tab;if(!currentBundle)return renderEmptyState('Seleccione un paciente o cree uno nuevo');const map={'Resumen':renderResumen,'Visitas':renderVisitas,'Dispensaciones':renderDispensaciones,'Activación':renderActivacion,'Informe':renderInforme};document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent===tab));document.getElementById('tabContent').innerHTML=map[tab](currentBundle);} 
function rowsOrEmpty(rows,col){return rows.length?rows.join(''):"<tr><td colspan='"+col+"'>Sin registros todavía</td></tr>";}
function mini(t,rows,h){return"<div class='card'><b>"+t+"</b><table class='tbl'><tr>"+h.map(x=>"<th>"+x+"</th>").join('')+"</tr>"+rowsOrEmpty(rows,h.length)+"</table></div>";}
function renderResumen(b){return"<h4>Resumen</h4>"+mini('Últimas visitas',b.visits.map(x=>"<tr><td>"+(x.fecha||'')+"</td><td>"+esc(x.tipoVisita||'')+"</td></tr>"),['Fecha','Tipo'])+mini('Últimas dispensaciones',b.dispensations.map(x=>"<tr><td>"+(x.fechaReal||'')+"</td><td>"+(x.retrasoDias||0)+"</td></tr>"),['Fecha','Retraso'])+mini('Última activación',b.activations.slice(0,1).map(x=>"<tr><td>"+(x.fecha||'')+"</td><td>"+esc(x.nivelActivacion||'')+"</td></tr>"),['Fecha','Nivel']);}
function renderVisitas(b){return"<h4>Visitas</h4><table class='tbl'><tr><th>Fecha</th><th>Tipo</th><th>Modalidad</th><th>Nivel</th></tr>"+rowsOrEmpty(b.visits.map(x=>"<tr><td>"+(x.fecha||'')+"</td><td>"+esc(x.tipoVisita||'')+"</td><td>"+esc(x.modalidad||'')+"</td><td>"+esc(x.nivelCMO||'')+"</td></tr>"),4)+"</table>";}
function renderDispensaciones(b){return"<h4>Dispensaciones</h4><table class='tbl'><tr><th>Prevista</th><th>Real</th><th>Retraso</th></tr>"+rowsOrEmpty(b.dispensations.map(x=>"<tr><td>"+(x.fechaPrevista||'')+"</td><td>"+(x.fechaReal||'')+"</td><td>"+(x.retrasoDias||0)+"</td></tr>"),3)+"</table>";}
function renderActivacion(b){return"<h4>Activación</h4><table class='tbl'><tr><th>Fecha</th><th>Puntuación</th><th>Nivel</th></tr>"+rowsOrEmpty(b.activations.map(x=>"<tr><td>"+(x.fecha||'')+"</td><td>"+(x.puntuacionTotal||'')+"</td><td>"+esc(x.nivelActivacion||'')+"</td></tr>"),3)+"</table>";}
function renderInforme(b){return"<h4>Informe</h4><div class='card'>"+(b.reportHtml||'Sin registros todavía')+"</div>";}
function savePatient(){const data={codigoPaciente:val('codigoPaciente'),centro:val('centro'),fechaAlta:val('fechaAlta'),estado:val('estado'),tratamientoActivo:val('tratamientoActivo'),nivelCMOActual:val('nivelCMOActual'),observaciones:val('obsPaciente')};const id=val('idPaciente');const onSuccess=function(r){console.log('createPatient response:',r);if(!r||!r.ok)return showMessage('error',(r&&r.error)||'No se pudo guardar el paciente.');showMessage('success','Paciente guardado correctamente');loadPatients();if(r.data&&r.data.idPaciente){selectPatient(r.data.idPaciente);}else{showMessage('error','No se pudo seleccionar automáticamente el paciente creado.');}};if(id){google.script.run.withSuccessHandler(onSuccess).withFailureHandler(function(e){handleFailure('updatePatient',e);}).updatePatient(id,data);}else{google.script.run.withSuccessHandler(onSuccess).withFailureHandler(function(e){handleFailure('createPatient',e);}).createPatient(data);}}
document.getElementById('search').oninput=loadPatients;document.getElementById('saveBtn').onclick=savePatient;initApp();
</script></body></html>
