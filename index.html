<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>cmodelta</title>
<style>body{font-family:Arial;margin:0;background:#f4f7fb}header{background:#12395f;color:#fff;padding:12px 16px}.wrap{max-width:1500px;margin:auto;padding:12px}.grid{display:grid;grid-template-columns:340px 1fr;gap:12px}.card{background:#fff;border:1px solid #d8e0ea;border-radius:8px;padding:10px}.patients{max-height:340px;overflow:auto}.p-item{border:1px solid #d9e3ef;padding:8px;border-radius:8px;margin:6px 0;cursor:pointer}.p-item.active{background:#e8f0fb}.tabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}.tab{padding:7px 10px;border:1px solid #cdd8e6;border-radius:999px;background:#fff;cursor:pointer}.tab.active{background:#12395f;color:#fff}.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th,.tbl td{border:1px solid #e5e7eb;padding:4px}.msg{display:none;padding:8px;border-radius:6px;margin:8px 0}.ok{background:#dcfce7}.err{background:#fee2e2}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.kpi{background:#f8fbff;border:1px solid #dce7f5;border-radius:8px;padding:8px}.n1{color:#b91c1c}.n2{color:#92400e}.n3{color:#1d4ed8}.small{font-size:12px;color:#555}input,select,textarea,button{width:100%;padding:7px;margin:4px 0;border:1px solid #c9d4e3;border-radius:6px;box-sizing:border-box}button{background:#12395f;color:#fff;cursor:pointer}.warn{background:#fff7ed;border-left:4px solid #f97316;padding:8px}.print-report .rblock{border:1px solid #d6deea;border-radius:8px;padding:8px;margin:8px 0}.print-report .sub{color:#4b5563}.note{font-size:12px;color:#374151;font-style:italic}.actions{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:8px;margin-bottom:8px}.actions button[disabled]{background:#94a3b8;cursor:not-allowed}.mode{font-weight:600;background:#eef4ff;padding:6px 8px;border-radius:6px;margin:6px 0}.field-err{display:none;color:#b91c1c;font-size:12px}.loading{opacity:.7;pointer-events:none}@media print{header,.leftcol,.tabs,.no-print,button,.actions,#msg,#warning{display:none!important}.grid{display:block}.card{border:none;padding:0}#workspace{display:block!important}#reportBox{display:block!important}}</style></head>
<body><header><h3 id='appTitle'>cmodelta</h3><div id='appSubtitle'></div></header><div class='wrap'><div id='warning' class='warn'></div><div id='msg' class='msg'></div><div class='grid'><section class='card leftcol'><h4>Pacientes</h4><input id='search' placeholder='Buscar por codigoPaciente'><div id='patientList' class='patients'></div><hr><h4>Crear/editar paciente</h4><div id='patientMode' class='mode'>Modo: Nuevo paciente</div><input id='idPaciente' type='hidden'><label>Código</label><input id='codigoPaciente'><div id='codigoError' class='field-err'>El código del paciente es obligatorio.</div><label>Centro</label><input id='centro'><label>Fecha alta</label><input id='fechaAlta' type='date'><label>Estado</label><select id='estado'><option>Activo</option><option>Seguimiento finalizado</option><option>Perdido</option><option>Suspendido</option></select><label>Tratamiento activo</label><select id='tratamientoActivo'><option>Sí</option><option>No</option></select><label>Nivel CMO</label><select id='nivelCMOActual'><option>Nivel 1</option><option>Nivel 2</option><option>Nivel 3</option></select><label>Observaciones</label><textarea id='obsPaciente'></textarea><div class='row'><div><button id='saveBtn'>Guardar nuevo paciente</button></div><div><button id='newPatientBtn' style='background:#475569'>Nuevo paciente</button></div></div></section><section class='card'><div class='actions no-print'><button id='topNewBtn'>Nuevo paciente</button><button id='topSaveBtn'>Guardar paciente</button><button id='topRefreshBtn'>Actualizar datos</button><button id='topReportBtn'>Generar informe</button><button id='topCopyBtn'>Copiar informe</button><button id='topPrintBtn'>Imprimir informe</button></div><div id='workspace'></div></section></div></div>
<script>
let selectedPatientId=null,patientsCache=[],currentBundle=null,activeTab='Resumen',formMode='new';const tabs=['Resumen','Visitas','Dispensaciones','Activación','Autoadministración','Respuesta','Seguridad','Intervenciones','Informe'];
const esc=s=>String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); const v=id=>document.getElementById(id)?.value||'';
function msg(t,x){const m=document.getElementById('msg');m.className='msg '+(t==='success'?'ok':'err');m.style.display='block';m.textContent=x;}
function formatErrorMessage(error){if(typeof error==='string')return error;if(error&&typeof error.message==='string')return error.message;if(error&&error.ok===false&&error.error){if(typeof error.error==='string')return error.error;const det=[error.error.message,error.error.code&&`[${error.error.code}]`,error.error.details].filter(Boolean).join(' ');if(det)return det;}return 'Se produjo un error inesperado. Revise la consola para más detalles.';}
function fail(ctx,e){console.groupCollapsed('[cmodelta] Error');console.debug('Contexto:',ctx);console.debug('Error original:',e);console.groupEnd();msg('error',`Error en ${ctx}: ${formatErrorMessage(e)}`);}
function debugLog(label,data){console.groupCollapsed(`[cmodelta] ${label}`);console.debug(data);console.groupEnd();}
function hasActivePatient(){return !!selectedPatientId;}
function updateModeUI(){const edit=hasActivePatient();patientMode.textContent=edit?`Modo: Edición (${selectedPatientId})`:'Modo: Nuevo paciente';saveBtn.textContent=edit?'Guardar cambios':'Guardar nuevo paciente';updateActionButtons();}
function updateActionButtons(){const dep=!hasActivePatient();[['topSaveBtn','Guardar paciente'],['topRefreshBtn','Actualizar datos'],['topReportBtn','Generar informe'],['topCopyBtn','Copiar informe'],['topPrintBtn','Imprimir informe']].forEach(([id])=>{const b=document.getElementById(id);if(!b)return;b.disabled=dep;b.title=dep?'Seleccione o cree un paciente antes de continuar':'';});}
function initApp(){google.script.run.withSuccessHandler(r=>{if(!r.ok)return msg('error',r.error);appTitle.textContent=r.data.appTitle;appSubtitle.textContent=r.data.appSubtitle;warning.textContent=r.data.dataWarning;loadPatients();renderEmpty();}).withFailureHandler(e=>fail('init',e)).apiGetInitialData();}
function renderEmpty(){workspace.innerHTML='<div class="small">Seleccione o cree un paciente antes de continuar.</div>'}
function loadPatients(){google.script.run.withSuccessHandler(r=>{if(!r.ok)return msg('error',r.error);patientsCache=r.data||[];patientList.innerHTML=patientsCache.map(p=>`<div class='p-item ${selectedPatientId===p.idPaciente?'active':''}' data-id='${esc(p.idPaciente)}'><b>${esc(p.codigoPaciente)}</b><div class='small'>${esc(p.centro)} · ${esc(p.estado)}</div></div>`).join('')||'<div class="small">Sin pacientes</div>';document.querySelectorAll('.p-item').forEach(x=>x.onclick=()=>selectPatient(x.dataset.id));}).withFailureHandler(e=>fail('listPatients',e)).listPatients(search.value);}
function selectPatient(id){selectedPatientId=id;idPaciente.value=id;formMode='edit';debugLog('Paciente seleccionado',{idPaciente:selectedPatientId});updateModeUI();loadPatients();refreshBundle();}
function refreshBundle(){if(!selectedPatientId){renderEmpty();return;} msg('success','Cargando datos...');google.script.run.withSuccessHandler(r=>{if(!r.ok)return msg('error',formatErrorMessage(r));currentBundle=r.data;renderFicha();}).withFailureHandler(e=>fail('getPatientBundle',e)).getPatientBundle(selectedPatientId)}
function renderFicha(){const p=currentBundle.patient;codigoPaciente.value=p.codigoPaciente||'';centro.value=p.centro||'';fechaAlta.value=p.fechaAlta||'';estado.value=p.estado||'Activo';tratamientoActivo.value=p.tratamientoActivo||'Sí';nivelCMOActual.value=p.nivelCMOActual||'Nivel 1';obsPaciente.value=p.observaciones||'';idPaciente.value=p.idPaciente||'';workspace.innerHTML=`<h3>Ficha del paciente</h3><div class='row'><div><b>Código:</b> ${esc(p.codigoPaciente)}</div><div><b>Centro:</b> ${esc(p.centro)}</div></div><div class='row'><div><b>Estado:</b> ${esc(p.estado)}</div><div><b>Tratamiento activo:</b> ${esc(p.tratamientoActivo)}</div></div><div class='row'><div><b>Nivel CMO actual:</b> <span class='${p.nivelCMOActual==='Nivel 1'?'n1':p.nivelCMOActual==='Nivel 2'?'n2':'n3'}'>${esc(p.nivelCMOActual)}</span></div><div><b>Fecha alta:</b> ${esc(p.fechaAlta)}</div></div><div><b>Fecha última visita:</b> ${esc(p.fechaUltimaVisita||'Sin registros todavía')}</div><div class='tabs'>${tabs.map(t=>`<button class='tab ${activeTab===t?'active':''}' onclick="switchTab('${t}')">${t}</button>`).join('')}</div><div id='tab'></div>`; switchTab(activeTab);}
function rows(r,c){return r.length?r.join(''):`<tr><td colspan='${c}'>Sin registros todavía</td></tr>`}
function switchTab(t){activeTab=t;document.getElementById('tab').innerHTML=({'Resumen':resumen,'Visitas':visitas,'Dispensaciones':disp,'Activación':activ,'Autoadministración':autoa,'Respuesta':resp,'Seguridad':seg,'Intervenciones':interv,'Informe':informe}[t])();}
function resumen(){const b=currentBundle;const last=(arr,f)=>arr[0]?arr[0][f]:'Sin registros todavía';return `<h4>Resumen</h4><p class='small'>Visión longitudinal rápida.</p><div class='cards'>${[['Nivel CMO actual',b.patient.nivelCMOActual],['Última visita',last(b.visits,'fecha')],['Última dispensación',last(b.dispensations,'fechaReal')],['Última activación',last(b.activations,'fecha')],['Última autoadministración',last(b.selfAdministration,'fecha')],['Última respuesta',last(b.responses,'fecha')],['Último evento seguridad',last(b.safetyEvents,'fecha')],['Nº intervenciones',b.interventions.length]].map(x=>`<div class='kpi'><b>${x[0]}</b><div>${esc(x[1])||'Sin registros todavía'}</div></div>`).join('')}</div>`}
function saveAndRefresh(fn,data,ok){google.script.run.withSuccessHandler(r=>{if(!r.ok)return msg('error',r.error);msg('success',ok);refreshBundle();}).withFailureHandler(e=>fail(fn,e))[fn](data)}
function visitas(){const b=currentBundle;return `<h4>Visitas</h4><p class='small'>Registro de actividad CMO.</p><div class='row'><div><label>Fecha*</label><input id='vi_fecha' type='date'></div><div><label>Tipo</label><select id='vi_tipo'><option>Inicial</option><option>Seguimiento</option><option>Revisión extraordinaria</option><option>Final</option></select></div></div><div class='row'><div><label>Modalidad</label><select id='vi_mod'><option>Presencial</option><option>Telefónica</option><option>Telemática</option></select></div><div><label>Nivel CMO</label><select id='vi_nivel'><option>Nivel 1</option><option>Nivel 2</option><option>Nivel 3</option></select></div></div><label>Motivo</label><input id='vi_mot'><label>Plan seguimiento</label><textarea id='vi_plan'></textarea><div class='row'><div><label>Próxima revisión</label><input id='vi_prox' type='date'></div><div><label>Observaciones</label><textarea id='vi_obs'></textarea></div></div><button onclick="saveAndRefresh('createVisit',{idPaciente:selectedPatientId,fecha:v('vi_fecha'),tipoVisita:v('vi_tipo'),modalidad:v('vi_mod'),motivo:v('vi_mot'),nivelCMO:v('vi_nivel'),planSeguimiento:v('vi_plan'),proximaRevision:v('vi_prox'),observaciones:v('vi_obs')},'Visita guardada')">Guardar visita</button><table class='tbl'><tr><th>Fecha</th><th>Tipo</th><th>Modalidad</th><th>Nivel CMO</th><th>Próxima revisión</th><th>Plan/resumen</th></tr>${rows(b.visits.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.tipoVisita)}</td><td>${esc(x.modalidad)}</td><td>${esc(x.nivelCMO)}</td><td>${x.proximaRevision||''}</td><td>${esc(x.planSeguimiento||x.motivo||'')}</td></tr>`),6)}</table>`}
function disp(){const b=currentBundle;return `<h4>Dispensaciones</h4><p class='small'>Control de adherencia y logística.</p><div class='row'><div><label>Fecha prevista*</label><input id='d_fp' type='date'></div><div><label>Fecha real*</label><input id='d_fr' type='date' oninput='calcDelay()'></div></div><div class='small'>Retraso calculado: <b id='delay'>0</b> días</div><div class='row'><div><label>Días cubiertos</label><input id='d_dc' type='number'></div><div><label>Incidencia</label><select id='d_in'><option>No</option><option>Sí</option></select></div></div><label>Intervención</label><textarea id='d_int'></textarea><div class='row'><div><label>Próxima dispensación</label><input id='d_pd' type='date'></div><div><label>Observaciones</label><textarea id='d_ob'></textarea></div></div><button onclick="saveAndRefresh('createDispensation',{idPaciente:selectedPatientId,fechaPrevista:v('d_fp'),fechaReal:v('d_fr'),diasCubiertos:v('d_dc'),incidencia:v('d_in'),intervencion:v('d_int'),proximaDispensacion:v('d_pd'),observaciones:v('d_ob')},'Dispensación guardada')">Guardar dispensación</button><table class='tbl'><tr><th>Fecha prevista</th><th>Fecha real</th><th>Retraso días</th><th>Días cubiertos</th><th>Incidencia</th><th>Próxima dispensación</th><th>Intervención</th></tr>${rows(b.dispensations.map(x=>`<tr><td>${x.fechaPrevista||''}</td><td>${x.fechaReal||''}</td><td>${x.retrasoDias||0}</td><td>${x.diasCubiertos||''}</td><td>${esc(x.incidencia||'')}</td><td>${x.proximaDispensacion||''}</td><td>${esc(x.intervencion||'')}</td></tr>`),7)}</table>`}
function calcDelay(){const fp=v('d_fp'),fr=v('d_fr');if(!fp||!fr)return;const d=Math.max(0,Math.floor((new Date(fr)-new Date(fp))/86400000));const e=document.getElementById('delay');if(e)e.textContent=d;}
function activ(){const b=currentBundle;const opts='<option value="0">0 = No</option><option value="1">1 = Parcialmente</option><option value="2">2 = Sí</option>';const fields=['enfermedad','objetivoTratamiento','administracion','conservacion','olvidos','efectosAdversos','contacto','decisiones'];const inputs=fields.map(f=>`<div><label>${f}</label><select id='a_${f}' onchange='calcAct()'>${opts}</select></div>`).join('');return `<h4>Activación</h4><p class='small'>Índice operativo de apoyo a la entrevista farmacéutica. No es un cuestionario validado.</p><label>Fecha</label><input id='a_fecha' type='date'><div class='row'>${inputs}</div><div class='small'>Puntuación: <b id='actScore'>0</b> · Nivel: <b id='actLevel'>baja activación</b></div><label>Observaciones</label><textarea id='a_ob'></textarea><button onclick="saveActivation()">Guardar activación</button><table class='tbl'><tr><th>Fecha</th><th>Puntuación</th><th>Nivel de activación</th><th>Observaciones</th></tr>${rows(b.activations.map(x=>`<tr><td>${x.fecha||''}</td><td>${x.puntuacionTotal||''}</td><td>${esc(x.nivelActivacion||'')}</td><td>${esc(x.observaciones||'')}</td></tr>`),4)}</table>`}
function calcAct(){const fs=['enfermedad','objetivoTratamiento','administracion','conservacion','olvidos','efectosAdversos','contacto','decisiones'];let s=0;fs.forEach(f=>s+=Number(v('a_'+f)||0));actScore.textContent=s;actLevel.textContent=s<=5?'baja activación':s<=11?'activación intermedia':'alta activación';}
function saveActivation(){const fs=['enfermedad','objetivoTratamiento','administracion','conservacion','olvidos','efectosAdversos','contacto','decisiones'];const data={idPaciente:selectedPatientId,fecha:v('a_fecha'),observaciones:v('a_ob')};fs.forEach(f=>data[f]=v('a_'+f));saveAndRefresh('createActivation',data,'Activación guardada');}
function autoa(){return generic('Autoadministración','Registro de técnica y autonomía.',"saveAndRefresh('createSelfAdministration',{idPaciente:selectedPatientId,fecha:v('au_f'),conservacionCorrecta:v('au_c'),preparacionCorrecta:v('au_p'),administracionCorrecta:v('au_a'),rotacionZonas:v('au_r'),manejoOlvidos:v('au_o'),manejoResiduos:v('au_m'),confianzaPaciente:v('au_conf'),necesitaReeducacion:v('au_need'),resultadoGlobal:v('au_res'),observaciones:v('au_obs')},'Autoadministración guardada')",`<div class='row'><div><label>Fecha</label><input id='au_f' type='date'></div><div><label>Confianza</label><select id='au_conf'><option>Alta</option><option>Intermedia</option><option>Baja</option></select></div></div><label>Conservación</label><select id='au_c'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Preparación</label><select id='au_p'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Administración</label><select id='au_a'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Rotación zonas</label><select id='au_r'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Manejo olvidos</label><select id='au_o'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Manejo residuos</label><select id='au_m'><option>Sí</option><option>Parcial</option><option>No</option></select><label>Necesita reeducación</label><select id='au_need'><option>Sí</option><option>No</option></select><label>Resultado global</label><select id='au_res'><option>Autónomo</option><option>Autónomo con dudas</option><option>Necesita reeducación</option><option>Necesita apoyo externo</option></select><label>Observaciones</label><textarea id='au_obs'></textarea>`,currentBundle.selfAdministration,['Fecha','Resultado global','Confianza','Necesita reeducación','Observaciones'],x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.resultadoGlobal||'')}</td><td>${esc(x.confianzaPaciente||'')}</td><td>${esc(x.necesitaReeducacion||'')}</td><td>${esc(x.observaciones||'')}</td></tr>`)}
function resp(){const b=currentBundle;return `<h4>Respuesta</h4><p class='small'>La herramienta no recomienda cambios terapéuticos automáticos. La respuesta debe interpretarse en coordinación con el equipo médico.</p><label>Fecha</label><input id='r_f' type='date'><div class='row'><div><label>Mes tratamiento</label><input id='r_m'></div><div><label>ARN-VHD</label><input id='r_arn'></div></div><div class='row'><div><label>ALT</label><input id='r_alt'></div><div><label>Respuesta global</label><select id='r_g'><option>favorable</option><option>parcial</option><option>discordante</option><option>no valorable</option><option>posible no respuesta/requiere revisión médica</option></select></div></div><label>Respuesta virológica</label><input id='r_v'><label>Respuesta bioquímica</label><input id='r_b'><label>Requiere revisión médica</label><select id='r_rev'><option>Sí</option><option>No</option></select><label>Comentario</label><textarea id='r_c'></textarea><button onclick="saveAndRefresh('createResponse',{idPaciente:selectedPatientId,fecha:v('r_f'),mesTratamiento:v('r_m'),arnVhd:v('r_arn'),alt:v('r_alt'),respuestaVirologica:v('r_v'),respuestaBioquimica:v('r_b'),respuestaGlobal:v('r_g'),requiereRevisionMedica:v('r_rev'),comentario:v('r_c')},'Respuesta guardada')">Guardar respuesta</button><table class='tbl'><tr><th>Fecha</th><th>Mes tratamiento</th><th>ARN-VHD</th><th>ALT</th><th>Respuesta global</th><th>Requiere revisión médica</th></tr>${rows(b.responses.map(x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.mesTratamiento||'')}</td><td>${esc(x.arnVhd||'')}</td><td>${esc(x.alt||'')}</td><td>${esc(x.respuestaGlobal||'')}</td><td>${esc(x.requiereRevisionMedica||'')}</td></tr>`),6)}</table>`}
function seg(){return generic('Seguridad','Registro de eventos de seguridad.',"saveAndRefresh('createSafetyEvent',{idPaciente:selectedPatientId,fecha:v('s_f'),tipoEvento:v('s_t'),gravedad:v('s_g'),relacionTratamiento:v('s_r'),accionRealizada:v('s_a'),resuelto:v('s_res'),comunicadoHepatologia:v('s_h'),observaciones:v('s_o')},'Evento de seguridad guardado')",`<label>Fecha</label><input id='s_f' type='date'><label>Tipo evento</label><select id='s_t'><option>Reacción local</option><option>Alteración analítica</option><option>Problema de conservación</option><option>Interrupción no planificada</option><option>Síntomas de alarma</option><option>Otro</option></select><label>Gravedad</label><select id='s_g'><option>Leve</option><option>Moderada</option><option>Grave</option></select><label>Relación tratamiento</label><select id='s_r'><option>No relacionada</option><option>Posible</option><option>Probable</option><option>No valorable</option></select><label>Acción realizada</label><textarea id='s_a'></textarea><label>Resuelto</label><select id='s_res'><option>Sí</option><option>No</option></select><label>Comunicado hepatología</label><select id='s_h'><option>Sí</option><option>No</option></select><label>Observaciones</label><textarea id='s_o'></textarea>`,currentBundle.safetyEvents,['Fecha','Evento','Gravedad','Relación','Acción','Resuelto','Comunicado hepatología'],x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.tipoEvento||'')}</td><td>${esc(x.gravedad||'')}</td><td>${esc(x.relacionTratamiento||'')}</td><td>${esc(x.accionRealizada||'')}</td><td>${esc(x.resuelto||'')}</td><td>${esc(x.comunicadoHepatologia||'')}</td></tr>`)}
function interv(){return generic('Intervenciones','Registro de intervención CMO.',"saveAndRefresh('createIntervention',{idPaciente:selectedPatientId,fecha:v('i_f'),dominioCMO:v('i_d'),tipoIntervencion:v('i_t'),descripcion:v('i_desc'),resultado:v('i_r'),aceptada:v('i_a'),seguimiento:v('i_s')},'Intervención guardada')",`<label>Fecha</label><input id='i_f' type='date'><label>Dominio CMO</label><select id='i_d'><option>Capacidad</option><option>Motivación</option><option>Oportunidad</option></select><label>Tipo intervención</label><input id='i_t'><label>Descripción</label><textarea id='i_desc'></textarea><label>Resultado</label><input id='i_r'><label>Aceptada</label><select id='i_a'><option>Sí</option><option>No</option><option>Pendiente</option></select><label>Seguimiento</label><textarea id='i_s'></textarea>`,currentBundle.interventions,['Fecha','Dominio CMO','Tipo','Descripción','Resultado','Aceptada'],x=>`<tr><td>${x.fecha||''}</td><td>${esc(x.dominioCMO||'')}</td><td>${esc(x.tipoIntervencion||'')}</td><td>${esc(x.descripcion||'')}</td><td>${esc(x.resultado||'')}</td><td>${esc(x.aceptada||'')}</td></tr>`)}
function generic(title,desc,onclick,form,data,heads,rowFn){return `<h4>${title}</h4><p class='small'>${desc}</p>${form}<button onclick="${onclick}">Guardar ${title.toLowerCase()}</button><table class='tbl'><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr>${rows(data.map(rowFn),heads.length)}</table>`}
function informe(){const b=currentBundle;return `<h4>Informe</h4><textarea id='rec' class='no-print' placeholder='Añadir recomendación farmacéutica editable antes de imprimir'></textarea><button class='no-print' onclick='buildReport()'>Actualizar informe</button><button class='no-print' onclick='copyReport()'>Copiar informe para HC</button><button class='no-print' onclick='window.print()'>Imprimir informe</button><div id='reportBox'>${b.reportHtml||'Sin registros todavía'}</div>`}
function buildReport(){google.script.run.withSuccessHandler(r=>{if(!r.ok)return msg('error',r.error);reportBox.innerHTML=r.data.reportHtml;msg('success','Informe actualizado');}).withFailureHandler(e=>fail('apiBuildReport',e)).apiBuildReport(selectedPatientId,v('rec'))}
function savePatient(){const data={codigoPaciente:v('codigoPaciente').trim(),centro:v('centro'),fechaAlta:v('fechaAlta'),estado:v('estado'),tratamientoActivo:v('tratamientoActivo'),nivelCMOActual:v('nivelCMOActual'),observaciones:v('obsPaciente')};const id=v('idPaciente');codigoError.style.display=data.codigoPaciente?'none':'block';if(!data.codigoPaciente)return msg('error','Debe informar el código del paciente antes de guardar.');if(formMode==='edit'&&(!id||id==='undefined'||id==='null'))return msg('error','No se puede actualizar: id de paciente inválido.');debugLog('Modo actual',formMode);debugLog('Payload guardado',{...data,idPaciente:id?'<presente>':'<nuevo>'});const prev=saveBtn.textContent;saveBtn.disabled=true;saveBtn.textContent='Guardando...';const onOk=r=>{debugLog('Respuesta backend',r);saveBtn.disabled=false;saveBtn.textContent=prev;if(!(r&&(r.ok===true||r.success===true)))return msg('error',`No se pudo guardar el paciente: ${formatErrorMessage(r)}`);msg('success','Paciente guardado correctamente');selectedPatientId=(r.data&&r.data.idPaciente)||id;idPaciente.value=selectedPatientId||'';formMode='edit';updateModeUI();loadPatients();if(selectedPatientId)refreshBundle();};const onErr=e=>{saveBtn.disabled=false;saveBtn.textContent=prev;fail(id?'updatePatient':'createPatient',e);};if(id){google.script.run.withSuccessHandler(onOk).withFailureHandler(onErr).updatePatient(id,data);}else{google.script.run.withSuccessHandler(onOk).withFailureHandler(onErr).createPatient(data);}}
function copyReport(){const p=currentBundle&&currentBundle.patient?currentBundle.patient:{};const t=['INFORME CLÍNICO/FARMACOTERAPÉUTICO',`Código pseudonimizado: ${p.codigoPaciente||'N/D'}`,`Centro: ${p.centro||'N/D'}`,`Estado: ${p.estado||'N/D'}`,`Tratamiento activo: ${p.tratamientoActivo||'N/D'}`,`Nivel CMO actual: ${p.nivelCMOActual||'N/D'}`,`Última visita: ${p.fechaUltimaVisita||'Sin registros todavía'}`,`Problemas farmacoterapéuticos/alertas: ${((currentBundle&&currentBundle.safetyEvents||[])[0]||{}).tipoEvento||'Sin registros todavía'}`,`Intervenciones farmacéuticas: ${(currentBundle&&currentBundle.interventions||[]).length||0}`,`Plan de seguimiento: ${((currentBundle&&currentBundle.visits||[])[0]||{}).planSeguimiento||'Sin registros todavía'}`,`Observaciones: ${p.observaciones||'Sin observaciones'}`].join('\n');navigator.clipboard.writeText(t).then(()=>msg('success','Informe copiado para HC')).catch(e=>msg('error','No se pudo copiar: '+formatErrorMessage(e)));}
function newPatient(){['idPaciente','codigoPaciente','centro','fechaAlta','obsPaciente'].forEach(x=>document.getElementById(x).value='');selectedPatientId=null;currentBundle=null;formMode='new';debugLog('Modo actual',formMode);updateModeUI();renderEmpty();loadPatients();}
function runBuildReport(){if(!hasActivePatient())return msg('error','Seleccione o cree un paciente antes de continuar');activeTab='Informe';refreshBundle();setTimeout(buildReport,150);}
function printReportView(){activeTab='Informe';switchTab('Informe');window.print();}
search.oninput=loadPatients;saveBtn.onclick=savePatient;newPatientBtn.onclick=newPatient;topNewBtn.onclick=newPatient;topSaveBtn.onclick=savePatient;topRefreshBtn.onclick=refreshBundle;topReportBtn.onclick=runBuildReport;topCopyBtn.onclick=copyReport;topPrintBtn.onclick=printReportView;initApp();updateActionButtons();
</script></body></html>
